<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar — ShellTI Explorador Mercado Público</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-wrap {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; padding: 24px; text-align: center;
    }
    .login-card {
      background: #0f172a; border: 1px solid #1e293b; border-radius: 12px;
      padding: 40px 32px; max-width: 380px; width: 100%;
    }
    .login-logo { width: 56px; height: 56px; margin-bottom: 16px; }
    .login-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px; font-weight: 800; color: #e2e8f0; margin: 0 0 4px; }
    .login-sub { font-size: 13px; color: #94a3b8; margin: 0 0 28px; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; height: 44px; border-radius: 8px; border: 1px solid #334155;
      background: #fff; color: #1f2937; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-google:hover { opacity: 0.9; }
    .btn-google:disabled { opacity: 0.6; cursor: default; }
    .login-error { color: #fc814a; font-size: 12px; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <img src="logo_shellti.webp" alt="ShellTI" class="login-logo" />
      <p class="login-title">Explorador Mercado Público</p>
      <p class="login-sub">Ingresa con tu cuenta de Google para continuar</p>
      <button class="btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.9v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.66 9c0-.59.1-1.17.29-1.7V4.97H.9A9 9 0 0 0 0 9c0 1.45.35 2.83.9 4.03l3.05-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .9 4.97L3.95 7.3C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
        Ingresar con Google
      </button>
      <p class="login-error" id="login-error">No se pudo iniciar sesión. Intenta de nuevo.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    (async function () {
      // Si ya hay sesión activa, no mostrar login: mandar directo al explorador.
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.replace("index.html");
        return;
      }

      document.getElementById("btn-google").addEventListener("click", async (e) => {
        const btn = e.currentTarget;
        btn.disabled = true;
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo: window.location.origin + "/index.html" },
        });
        if (error) {
          document.getElementById("login-error").style.display = "block";
          btn.disabled = false;
        }
        // Si no hay error, el navegador redirige a Google automáticamente.
      });
    })();
  </script>
</body>
</html>
