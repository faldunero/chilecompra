<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShellTI — Explorador ChileCompra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="logo_shellti.webp" alt="ShellTI" class="header-logo" />
        <div class="header-brand-text">
          <span class="brand-name">Shell<span class="brand-ti">TI</span></span>
          <span class="brand-sub">Explorador Mercado Público</span>
        </div>
      </div>
      <div class="header-status" id="health-badge">
        <span class="dot dot-gray"></span>
        <span>Sistema…</span>
      </div>
    </div>
  </header>

  <!-- ── Barra Edición ── -->
  <nav class="edicion-bar">
    <div class="edicion-bar-inner">
      <span class="edicion-bar-title">
        <svg width="12" height="12" viewBox="0 0 13 13" fill="none" aria-hidden="true">
          <path d="M2 10.5h9M8.5 2l2.5 2.5-6 6H2.5V8L8.5 2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        </svg>
        Edición
      </span>

      <div class="edicion-section">
        <button class="edicion-section-toggle" data-target="esec-params-body" aria-expanded="false">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true" class="toggle-chevron">
            <path d="M2.5 4L5.5 7L8.5 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Parámetros licitación
        </button>
        <div class="edicion-section-body" id="esec-params-body" hidden>
          <div class="edicion-fields">
            <div class="edicion-field">
              <label class="edicion-label">Tipo licitación</label>
              <select class="edicion-input" id="ep-tipo">
                <option value="">Todos</option>
                <option value="LE">LE — ≤1000 UTM</option>
                <option value="LP">LP — &gt;1000 UTM</option>
                <option value="LQ">LQ — &gt;2000 UTM</option>
                <option value="LR">LR — &gt;5000 UTM</option>
                <option value="CO">CO — Convenio marco</option>
                <option value="TR">TR — Trato directo</option>
                <option value="L1">L1 — Licitación privada</option>
              </select>
            </div>
            <div class="edicion-field">
              <label class="edicion-label">Estado</label>
              <select class="edicion-input" id="ep-estado">
                <option value="">Todos</option>
                <option value="publicada">Publicada</option>
                <option value="cerrada">Cerrada</option>
                <option value="adjudicada">Adjudicada</option>
                <option value="desierta">Desierta</option>
              </select>
            </div>
            <div class="edicion-field">
              <label class="edicion-label">Palabra clave</label>
              <input type="text" class="edicion-input" id="ep-keyword" placeholder="Ej: notebook…" />
            </div>
            <div class="edicion-field">
              <label class="edicion-label">Región</label>
              <select class="edicion-input" id="ep-region">
                <option value="">Todas</option>
                <option value="1">Tarapacá</option>
                <option value="2">Antofagasta</option>
                <option value="3">Atacama</option>
                <option value="4">Coquimbo</option>
                <option value="5">Valparaíso</option>
                <option value="6">O'Higgins</option>
                <option value="7">Maule</option>
                <option value="8">Biobío</option>
                <option value="9">La Araucanía</option>
                <option value="10">Los Lagos</option>
                <option value="11">Aysén</option>
                <option value="12">Magallanes</option>
                <option value="13">Metropolitana</option>
                <option value="14">Los Ríos</option>
                <option value="15">Arica y Parinacota</option>
                <option value="16">Ñuble</option>
              </select>
            </div>
            <div class="edicion-actions">
              <button class="edicion-btn-apply" id="ep-apply">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                  <path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Aplicar
              </button>
              <button class="edicion-btn-clear" id="ep-clear">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                  <path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                Limpiar
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </nav>

  <main class="app-main">

    <aside class="sidebar">
      <section class="panel">
        <h2 class="panel-title">Parámetros de búsqueda</h2>

        <div class="tabs">
          <button class="tab active" data-tab="fecha">Por fecha</button>
          <button class="tab" data-tab="organismo">Por organismo</button>
          <button class="tab" data-tab="codigo">Por código</button>
        </div>

        <div class="tab-panel active" id="panel-fecha">
          <div class="date-range-group">
            <div class="date-range-field">
              <label class="field-label" for="input-fecha-desde">Desde</label>
              <input type="date" id="input-fecha-desde" class="field-input" />
            </div>
            <div class="date-range-separator">→</div>
            <div class="date-range-field">
              <label class="field-label" for="input-fecha-hasta">Hasta</label>
              <input type="date" id="input-fecha-hasta" class="field-input" />
            </div>
          </div>
        </div>
        <div class="tab-panel" id="panel-organismo">
          <label class="field-label" for="input-org">Código de organismo</label>
          <input type="text" id="input-org" class="field-input" placeholder="Ej: 89100" />
        </div>
        <div class="tab-panel" id="panel-codigo">
          <label class="field-label" for="input-cod">Código de licitación</label>
          <input type="text" id="input-cod" class="field-input" placeholder="Ej: 2345-1-LE26" />
        </div>

        <button class="btn-primary" id="btn-buscar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Buscar licitaciones
        </button>

        <button class="btn-ai" id="btn-analizar" hidden>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M8 2l1.5 3 3.5.5-2.5 2.5.5 3.5L8 10l-3 1.5.5-3.5L3 5.5 6.5 5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
          Analizar con IA
        </button>
      </section>

      <section class="panel stats-panel" id="stats-panel" hidden>
        <h2 class="panel-title">Resumen</h2>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-value" id="stat-total">—</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-publicadas">—</div>
            <div class="stat-label">Publicadas</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-organismos">—</div>
            <div class="stat-label">Organismos</div>
          </div>
        </div>
      </section>
    </aside>

    <section class="content">
      <div class="content-toolbar" id="toolbar" hidden>
        <input type="text" class="search-input" id="filter-input" placeholder="Filtrar por nombre, código u organismo…" />
        <select class="field-input select-estado" id="filter-estado">
          <option value="">Todos los estados</option>
          <option value="publicada">Publicada</option>
          <option value="cerrada">Cerrada</option>
          <option value="adjudicada">Adjudicada</option>
        </select>
      </div>

      <div class="demo-banner" id="demo-banner" hidden>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/>
          <path d="M7 4v3.5L9 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Modo demo — datos ficticios.
      </div>

      <div class="ai-panel" id="ai-panel" hidden>
        <div class="ai-panel-header">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M8 2l1.5 3 3.5.5-2.5 2.5.5 3.5L8 10l-3 1.5.5-3.5L3 5.5 6.5 5z" stroke="#a855f7" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
          Análisis IA para ShellTI
          <span class="ai-badge">Groq · Llama 3.3</span>
        </div>
        <div class="ai-content" id="ai-content"></div>
      </div>

      <div id="results-container">
        <div class="empty-state">
          <div class="empty-wolf">
            <img src="logo_shellti.webp" alt="" aria-hidden="true" />
          </div>
          <p class="empty-title">Sistema listo</p>
          <p class="empty-sub">Configura los parámetros y ejecuta una búsqueda</p>
        </div>
      </div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
